<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fd</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #1f1f1f;
      --muted: #666666;
      --border: #e6e6e6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }

    .wrap {
      width: 100%;
      max-width: 860px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .message {
      font-size: 28px;
      line-height: 1.35;
      margin: 0 0 22px 0;
      font-weight: 600;
      text-align: center;
    }

    .photos {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .photo-box {
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-box video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .placeholder {
      color: var(--muted);
      font-size: 15px;
      text-align: center;
      padding: 20px;
    }

    .note {
      margin-top: 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 700px) {
      .message { font-size: 22px; }
      .photos { grid-template-columns: 1fr; }
      .photo-box { min-height: 240px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <p class="message">Feliz mes amor, seguimos sumando momentos humildes</p>

      <div class="photos">
        <div class="photo-box">
          <img src="1.jpeg" alt="Foto 1" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
          
        </div>

        <div class="photo-box">
            <img src="3.jpeg" alt="Foto 1" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
        
        </div>
      </div>

    </div>
  </div>
</body>
</html
